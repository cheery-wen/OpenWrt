name: OpenWrt 25.12 | APK纯净最终版
on: workflow_dispatch

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: .config
  DIY1: diy1.sh
  DIY2: diy2.sh
  TZ: Asia/Shanghai
  UPLOAD_RELEASE: true
  UPLOAD_FIRMWARE: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: 系统空间精简清理
        run: |
          sudo apt-get clean
          docker system prune -f --filter "dangling=true"
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/pipx
          df -h

      - name: 拉取仓库全部文件
        uses: actions/checkout@v5

      - name: 统一时区 & 编译日期
        run: |
          echo "DATE1=$(date +'%Y.%m.%d-%H.%M')" >> $GITHUB_ENV
          echo "DATE2=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          sudo timedatectl set-timezone Asia/Shanghai

      - name: 安装编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev python3 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler g++-multilib antlr3 gperf wget curl swig rsync

      - name: 克隆官方 OpenWrt 25.12
        run: git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt

      - name: 载入feeds & 执行前置DIY
        run: |
          cd openwrt
          [ -f "../feeds.conf.default" ] && cp -f ../feeds.conf.default feeds.conf
          [ -f "../${{ env.DIY1 }}" ] && chmod +x ../${{ env.DIY1 }} && ../${{ env.DIY1 }}

      - name: 替换 Golang 26.x
        run: |
          cd openwrt
          rm -rf feeds/packages/lang/golang
          git clone --depth 1 https://github.com/sbwml/packages_lang_golang -b 26.x feeds/packages/lang/golang

      - name: 更新 & 安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: feeds后置清理多余插件
        run: |
          cd openwrt
          rm -rf feeds/luci/applications/luci-app-control-webrestriction
          rm -rf feeds/luci/applications/luci-app-ramfree
          rm -rf feeds/luci/applications/luci-app-poweroff

      - name: 安全缓存 dl 目录
        uses: actions/cache@v5
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ github.ref }}-${{ github.run_id }}
          restore-keys: openwrt-dl-${{ github.ref }}-

      - name: 正确载入.config & 执行收尾DIY
        run: |
          [ -f "${{ env.CONFIG_FILE }}" ] && cp -f "${{ env.CONFIG_FILE }}" openwrt/.config
          cd openwrt
          [ -f "../${{ env.DIY2 }}" ] && chmod +x ../${{ env.DIY2 }} && ../${{ env.DIY2 }}

      - name: 校验LuCI核心配置
        run: |
          cd openwrt
          grep -E 'CONFIG_PACKAGE_luci=y|CONFIG_PACKAGE_uhttpd=y' .config

      - name: 下载全部依赖包
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s

      - name: 开始编译固件
        id: compile
        run: |
          cd openwrt
          echo "$(nproc) 线程编译中..."
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 绝对路径整理固件｜无路径符号
        id: arrange
        if: steps.compile.outputs.status == 'success'
        run: |
          FIRMWARE_DIR="$GITHUB_WORKSPACE/firmware"
          mkdir -p "$FIRMWARE_DIR"
          find openwrt/bin/targets/x86/64 -maxdepth 3 -type f -name "*squashfs*.img*" | while read img
          do
            name=$(basename "$img")
            cp "$img" "$FIRMWARE_DIR/${{ env.DATE1 }}_x86_64_$name"
          done
          echo "FIRMWARE=$FIRMWARE_DIR" >> $GITHUB_ENV

      - name: 上传固件至Artifact
        if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: OpenWrt_${{ env.DATE2 }}_APK纯净版
          path: ${{ env.FIRMWARE }}

      - name: 生成Release备注文件
        run: |
          echo "✅ 系统：OpenWrt Official 25.12" > release_note.txt
          echo "✅ 包管理器：APK（彻底禁用 OPKG）" >> release_note.txt
          echo "✅ 架构：x86_64 EFI+BIOS 双启动" >> release_note.txt
          echo "✅ 内核优化：1000HZ｜内核抢占｜BBR｜全锥NAT｜AES加速" >> release_note.txt
          echo "✅ 预装插件：Argon主题｜Argon设置｜Passwall｜Lucky" >> release_note.txt
          echo "✅ 默认后台：192.168.5.1" >> release_note.txt
          echo "✅ Root密码：无" >> release_note.txt
          echo "" >> release_note.txt
          echo "Compile by cheery" >> release_note.txt

      - name: 自动发布 Release
        if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DATE2 }}
          name: OpenWrt ${{ env.DATE2 }} APK终极定稿
          body_path: release_note.txt
          files: ${{ env.FIRMWARE }}/*

      - name: 编译后自动清理
        if: always()
        run: |
          rm -rf openwrt firmware release_note.txt 2>/dev/null || true
          sudo apt-get clean
