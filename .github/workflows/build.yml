name: 编译 OpenWrt 25.12 (最终优化版)

on:
  push:
    branches: [ master ]
  repository_dispatch:
  workflow_dispatch:
    inputs:
      build_type:
        description: "编译类型"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - snapshot

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  REPO_TAG: v25.12.4

  CONFIG_FILE: .config
  FEEDS_CONF: feeds.conf.default
  DIY1_SH: diy1.sh
  DIY2_SH: diy2.sh

  TZ: Asia/Shanghai

  OPENWRT_NAME: "OpenWrt"

  UPLOAD_RELEASE: true
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true

  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 2G

jobs:
  build:
    name: 编译任务
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:

      - name: 释放系统最大可用空间
        run: |
          sudo apt-get clean

          docker system prune -af || true

          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /opt/hostedtoolcache \
            /usr/local/.ghcup \
            /usr/local/.cargo \
            /usr/local/lib/python3.* \
            /usr/local/aws-sam-cli \
            /usr/local/aws-cli \
            /usr/local/julia* \
            /usr/share/swift \
            /usr/share/miniconda \
            /usr/share/az* \
            /usr/share/kotlinc \
            /opt/microsoft \
            /opt/google \
            /var/lib/gems \
            /opt/pipx \
            /opt/amazon || true

          df -h

      - name: 检出仓库代码
        uses: actions/checkout@v5

      - name: 设置当前日期与编译类型变量
        run: |
          sudo timedatectl set-timezone "$TZ"

          echo "date1=$(date +'%Y.%m.%d-%H.%M')" >> $GITHUB_ENV
          echo "date2=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "date3=$(date '+%Y年%m月%d日')" >> $GITHUB_ENV
          # 简化赋值，无输入时默认stable
          echo "BUILD_TYPE=${{ github.event.inputs.build_type || 'stable' }}" >> $GITHUB_ENV

      - name: 安装编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update

          sudo -E apt-get -qq install \
            ack antlr3 asciidoc autoconf automake autopoint \
            binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler \
            flex gawk gettext gcc-multilib g++-multilib \
            git git-core gperf haveged help2man intltool \
            libc6-dev-i386 libelf-dev libfuse-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev \
            libpython3-dev libreadline-dev \
            libssl-dev libtool \
            lrzsz msmtp ninja-build \
            p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools \
            qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs \
            unzip upx wget xmlto xxd zlib1g-dev

          df -h

      - name: 克隆 OpenWrt 稳定版源码
        run: |
          # 单分支+浅克隆，大幅减少下载体积，提升速度
          git clone \
            --depth=1 \
            --single-branch \
            --branch "$REPO_BRANCH" \
            "$REPO_URL" \
            openwrt

          cd openwrt

          # 变量兜底保护，丢失默认stable
          if [ "${BUILD_TYPE:-stable}" = "stable" ]; then
            # 仅单独拉取指定Tag，不拉取全部标签历史
            git fetch --force --depth=1 origin "refs/tags/$REPO_TAG:refs/tags/$REPO_TAG"
            git checkout --detach "$REPO_TAG"
            echo "=== 当前编译稳定版Tag: $REPO_TAG ==="
          else
            echo "=== 当前编译Snapshot分支最新代码 ==="
          fi

          echo "当前源码版本："
          git describe --tags --always

          echo "当前源码Commit："
          git log -1 --oneline

      - name: 初始化缓存目录
        run: |
          mkdir -p openwrt/dl
          mkdir -p $GITHUB_WORKSPACE/.ccache

          ccache -M 2G
          ccache -o compression=true

          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache"

      - name: 首次自定义配置
        run: |
          cd openwrt

          [ -f "../$FEEDS_CONF" ] && cp "../$FEEDS_CONF" ./

          if [ -f "../$DIY1_SH" ]; then
            chmod +x "../$DIY1_SH"
            "../$DIY1_SH"
          fi

      - name: 缓存 dl 目录
        uses: actions/cache@v5
        with:
          path: openwrt/dl
          key: dl-${{ runner.os }}-${{ github.ref_name }}-${{ env.BUILD_TYPE }}
          restore-keys: |
            dl-${{ runner.os }}-${{ github.ref_name }}-

      - name: 缓存 ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ env.BUILD_TYPE }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-

      - name: 更新 feeds
        run: |
          cd openwrt

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 再次加载自定义配置
        run: |
          [ -f "$CONFIG_FILE" ] && cp "$CONFIG_FILE" openwrt/.config

          cd openwrt

          if [ -f "../$DIY2_SH" ]; then
            chmod +x "../$DIY2_SH"
            "../$DIY2_SH"
          fi

          make defconfig

      - name: 下载源码包
        run: |
          cd openwrt

          make download -j$(nproc)

          find dl -size -1024c \
            -exec ls -l {} \; \
            -exec rm -f {} \;

          make download -j$(nproc) || \
          make download -j1 V=s

      - name: 编译固件
        id: compile
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR="${{ github.workspace }}/.ccache"

          ccache -z

          cd openwrt

          echo "$(nproc) thread compile"

          make -j$(nproc) || \
          make -j1 || \
          make -j1 V=s

          ccache -s

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 检查磁盘使用情况
        if: (!cancelled())
        run: |
          df -hT

      - name: 上传 bin 目录
        if: steps.compile.outcome == 'success' && env.UPLOAD_BIN_DIR == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bin_${{ env.OPENWRT_NAME }}_${{ env.BUILD_TYPE }}_${{ env.date1 }}
          path: openwrt/bin

      - name: 整理固件文件
        id: organize
        if: steps.compile.outcome == 'success'
        run: |
          mkdir -p firmware

          first_file=$(find openwrt/bin/targets \
            -type f \
            \( -name "*sysupgrade*" \
            -o -name "*factory*" \
            -o -name "*combined*" \) | head -1)

          if [ -z "$first_file" ]; then
            echo "ERROR: No firmware found!"
            exit 1
          fi

          target_dir=$(dirname "$first_file")
          parent=$(basename "$(dirname "$target_dir")")
          child=$(basename "$target_dir")

          device="${parent}_${child}"
          device=$(echo "$device" | sed 's/[^a-zA-Z0-9._-]/_/g')

          echo "DEVICE_NAME=$device" >> $GITHUB_ENV

          cp openwrt/.config \
            "firmware/${date1}_${OPENWRT_NAME}_${BUILD_TYPE}_${device}.config"

          find openwrt/bin/targets \
            -type f \
            \( -name "*sysupgrade*" \
            -o -name "*factory*" \
            -o -name "*combined*" \) | while read file
          do
            base=$(basename "$file")
            clean_base=$(echo "$base" | sed -E 's/^([^-]+-){3}//')

            cp "$file" \
              "firmware/${date1}_${OPENWRT_NAME}_${BUILD_TYPE}_${device}_${clean_base}"
          done

          cd firmware

          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

          ls -lh

      - name: 上传固件到 Artifact
        if: steps.organize.outcome == 'success' && env.UPLOAD_FIRMWARE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firmware_${{ env.OPENWRT_NAME }}_${{ env.BUILD_TYPE }}_${{ env.DEVICE_NAME }}_${{ env.date1 }}
          path: ${{ env.FIRMWARE }}

      - name: 创建 Release
        if: steps.organize.outcome == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.date1 }}-${{ github.run_number }}-${{ env.BUILD_TYPE }}
          name: ${{ env.date3 }} ${{ env.BUILD_TYPE }} 固件
          files: ${{ env.FIRMWARE }}/*
          draft: false
          prerelease: false

      - name: 编译后深度清理
        if: always()
        run: |
          cd openwrt

          rm -rf build_dir
          rm -rf staging_dir
          rm -rf tmp
          rm -rf bin

          ccache -s || true

          df -h
