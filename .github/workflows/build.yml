name: OpenWrt 25.12 全自动最终无错版

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 清理环境 & 安装完整依赖
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/pipx
          sudo apt-get -qq update
          sudo apt-get -qq install -y build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev unzip zlib1g-dev libc6-dev-i386 flex uglifyjs gcc-multilib p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler g++-multilib gperf wget curl swig rsync cpio perl file bc patch mold python3 iproute2
          df -h

      - name: 拉取仓库文件
        uses: actions/checkout@v5

      - name: 生成日期
        run: |
          echo "DATE1=$(TZ=Asia/Shanghai date +'%Y.%m.%d-%H.%M')" >> $GITHUB_ENV
          echo "RUN_NUM=${{ github.run_number }}" >> $GITHUB_ENV

      - name: 克隆OpenWrt 25.12源码
        run: git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt

      - name: DL目录防炸
        run: mkdir -p openwrt/dl

      # ====================== 🔥 网络增强（关键升级） ======================
      - name: 强化网络配置（防止进不去后台）
        run: |
          mkdir -p openwrt/files/etc/config

          cat > openwrt/files/etc/config/network << EOF
          config device
              option name 'br-lan'
              option type 'bridge'
              list ports 'eth0'

          config interface 'lan'
              option device 'br-lan'
              option proto 'static'
              option ipaddr '192.168.5.1'
              option netmask '255.255.255.0'
              option ip6assign '60'

          config interface 'wan'
              option device 'eth1'
              option proto 'dhcp'

          config interface 'wan6'
              option device 'eth1'
              option proto 'dhcpv6'
          EOF

          # 🔥 fallback 防止完全断网（关键增强）
          cat > openwrt/files/etc/uci-defaults/99-fallback-ip << EOF
          uci set network.lan.ipaddr='192.168.5.1'
          uci commit network
          /etc/init.d/network restart
          exit 0
          EOF

      - name: 防火墙安全配置
        run: |
          cat > openwrt/files/etc/config/firewall << EOF
          config zone
              option name 'lan'
              option network 'lan'
              option input 'ACCEPT'
              option output 'ACCEPT'
              option forward 'ACCEPT'

          config zone
              option name 'wan'
              option network 'wan wan6'
              option input 'REJECT'
              option output 'ACCEPT'
              option forward 'REJECT'

          config forwarding
              option src 'lan'
              option dest 'wan'
          EOF

      # ====================== DIY ======================
      - name: 执行diy1.sh（含Passwall）
        run: |
          cd openwrt
          cp -f ../feeds.conf.default feeds.conf.default || true
          chmod +x ../diy1.sh
          ../diy1.sh

      - name: 写入.config + diy2
        run: |
          cd openwrt
          cp -f ../.config .config
          chmod +x ../diy2.sh
          ../diy2.sh

      # ====================== 下载缓存 ======================
      - name: DL缓存
        uses: actions/cache@v5
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ github.ref }}-${{ hashFiles('openwrt/.config','openwrt/feeds.conf.default') }}

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s

      # ====================== 编译 ======================
      - name: 编译固件（稳定模式）
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s

      # ====================== 日志 ======================
      - name: 上传日志
        uses: actions/upload-artifact@v5
        with:
          name: Build-Log-${{ env.DATE1 }}
          path: openwrt/build.log

      # ====================== 固件 ======================
      - name: 整理固件
        run: |
          mkdir -p firmware
          cp openwrt/bin/targets/x86/64/*combined* firmware/ || true

      - name: 上传固件
        uses: actions/upload-artifact@v5
        with:
          name: OpenWrt-Firmware-${{ env.DATE1 }}
          path: firmware/

      # ====================== Release ======================
      - name: 发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DATE1 }}-${{ github.run_number }}
          name: OpenWrt25.12 稳定增强版
          body: |
            LAN: 192.168.5.1（已加fallback防炸）
            WAN: DHCP
            Passwall / Argon / Lucky / Samba4
            ✔ 防止无法进入后台优化
          files: firmware/*

      - name: 清理
        if: always()
        run: rm -rf openwrt firmware
