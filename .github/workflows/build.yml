name: OpenWrt 25.12 全自动编译
on: workflow_dispatch

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: 安装编译依赖（预装mold链接器）
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/pipx
          sudo apt-get -qq update
          sudo apt-get -qq install -y build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler g++-multilib antlr3 gperf wget curl swig rsync cpio perl python3-distutils file bc patch mold
          df -h

      - name: 拉取仓库全部文件
        uses: actions/checkout@v5

      - name: 定义全局编译变量
        run: |
          echo "DATE1=$(TZ=Asia/Shanghai date +'%Y.%m.%d-%H.%M')" >> $GITHUB_ENV
          echo "RUN_NUM=${{ github.run_number }}" >> $GITHUB_ENV

      - name: 克隆 OpenWrt 25.12 官方源码
        run: git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} openwrt

      - name: 执行 diy1 前置配置
        run: |
          cd openwrt
          [ -f ../feeds.conf.default ] && cp -f ../feeds.conf.default feeds.conf
          chmod +x ../diy1.sh && ../diy1.sh

      - name: 复制配置 + 执行 diy2 优化固化
        run: |
          cp -f .config openwrt/.config
          cd openwrt
          chmod +x ../diy2.sh && ../diy2.sh

      - name: 编译缓存精准命中
        uses: actions/cache@v6
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ github.ref }}-${{ hashFiles('openwrt/.config','openwrt/feeds.conf.default') }}
          restore-keys: openwrt-dl-${{ github.ref }}-

      - name: 下载全部依赖包
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s || exit 1

      - name: 并行编译固件 & 输出完整日志
        id: build_status
        run: |
          cd openwrt
          make -j$(nproc) 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: 上传编译日志
        uses: actions/upload-artifact@v6
        with:
          name: Build-Log-${{ env.DATE1 }}
          path: openwrt/build.log

      - name: 打包固件
        if: success()
        run: |
          cd openwrt/bin/targets/x86/64
          mkdir -p $GITHUB_WORKSPACE/firmware
          cp *combined*.img* $GITHUB_WORKSPACE/firmware/

      - name: 上传成品固件
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: OpenWrt-Firmware-${{ env.DATE1 }}
          path: firmware/

      - name: 自动发布 Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DATE1 }}-${{ env.RUN_NUM }}
          name: OpenWrt25.12 极致稳定最终版
          body: "编译时间：${{ env.DATE1 }}\n✅ 全错误修复｜官方规范｜依赖齐全｜网络稳定｜零冲突"
          files: firmware/*

      - name: 全局清理
        if: always()
        run: rm -rf openwrt firmware
